<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222535; --border: #2e3347;
    --accent: #4f8ef7; --accent2: #7c3aed; --success: #22c55e; --warning: #f59e0b;
    --danger: #ef4444; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --mono: 'JetBrains Mono', monospace; --sans: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; }
  .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .header-meta { display: flex; align-items: center; gap: 12px; }
  .ym-selector { display: flex; gap: 6px; }
  .ym-selector select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 6px; font-family: var(--sans); font-size: 13px; cursor: pointer; }

  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; }
  .tab { padding: 10px 18px; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 24px; max-width: 1500px; margin: 0 auto; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .panel-title { font-weight: 600; font-size: 13px; }

  .btn { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 500; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3b7de8; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  input, select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 10px; font-family: var(--sans); font-size: 13px; outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--accent); }
  input[type=number] { font-family: var(--mono); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 입력 탭 */
  .input-layout { display: grid; grid-template-columns: 240px 1fr; gap: 16px; }
  .member-scroll { overflow-y: auto; max-height: calc(100vh - 145px); }
  .dept-header { padding: 6px 14px; font-size: 11px; font-weight: 700; color: var(--text3); background: var(--surface2); letter-spacing: .5px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .member-item { padding: 9px 16px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; transition: background .1s; font-size: 13px; }
  .member-item:hover { background: var(--surface2); }
  .member-item.selected { background: rgba(79,142,247,.12); color: var(--accent); }
  .mh-badge { font-family: var(--mono); font-size: 11px; color: var(--text3); background: var(--surface2); padding: 2px 6px; border-radius: 4px; }
  .member-item.selected .mh-badge { background: rgba(79,142,247,.2); color: var(--accent); }

  .mh-table-wrap { overflow: auto; max-height: calc(100vh - 145px); }
  .mh-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .mh-table th { background: var(--surface2); padding: 7px 6px; text-align: center; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 11px; position: sticky; top: 0; z-index: 5; }
  .mh-table th.col-date { text-align: left; min-width: 55px; }
  .mh-table th.col-oh { background: rgba(124,58,237,.15); color: #a78bfa; }
  .mh-table th.col-pj { background: rgba(79,142,247,.15); color: var(--accent); }
  .mh-table td { padding: 3px 4px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
  .mh-table td.col-date { font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: left; padding-left: 10px; }
  .mh-table tr.weekend td { background: rgba(255,255,255,.01); }
  .mh-table tr.weekend td.col-date { opacity: .4; }
  .mh-table tr.istoday td.col-date { color: var(--accent); font-weight: 700; }
  .mh-table tr.over-limit td { background: rgba(239,68,68,.05); }
  .mh-input { width: 46px; padding: 3px 4px; text-align: center; font-family: var(--mono); font-size: 12px; border-radius: 4px; }
  .mh-input:disabled { opacity: .2; cursor: not-allowed; background: transparent; border-color: transparent; }
  .row-total { font-family: var(--mono); font-size: 11px; font-weight: 700; }
  .row-total.ok { color: var(--success); }
  .row-total.over { color: var(--danger); }
  .col-total-row td { background: var(--surface2); font-family: var(--mono); font-weight: 700; font-size: 12px; padding: 8px 4px; border-top: 2px solid var(--border); }

  /* 집계 탭 */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px; padding: 16px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .stat-value { font-family: var(--mono); font-size: 20px; font-weight: 600; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .summary-wrap { padding: 0 16px 16px; overflow-x: auto; }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .summary-table th { background: var(--surface2); padding: 8px 10px; text-align: right; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 11px; }
  .summary-table th:first-child { text-align: left; }
  .summary-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); text-align: right; font-family: var(--mono); font-size: 12px; }
  .summary-table td:first-child { text-align: left; font-family: var(--sans); }
  .summary-table .dept-row td { background: rgba(79,142,247,.07); color: var(--accent); font-weight: 700; font-size: 11px; padding: 5px 10px; border-top: 1px solid var(--border); }
  .summary-table .total-row td { background: var(--surface2); font-weight: 700; border-top: 2px solid var(--border); }
  .mh-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .mh-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }

  /* 관리 탭 */
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; min-height: 52px; }
  .tag { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; }
  .tag-btn { cursor: pointer; color: var(--text3); font-size: 13px; line-height: 1; transition: color .1s; background: none; border: none; padding: 0; font-family: var(--sans); }
  .tag-btn:hover { color: var(--accent); }
  .tag-btn.del:hover { color: var(--danger); }
  .add-row { display: flex; gap: 8px; padding: 0 16px 14px; flex-wrap: wrap; }
  .add-row input { flex: 1; min-width: 70px; }

  /* 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-width: 300px; max-width: 440px; width: 90%; }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .modal-row { margin-bottom: 12px; }
  .modal-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .modal-row input, .modal-row select { width: 100%; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text3); gap: 10px; font-size: 13px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { padding: 40px; text-align: center; color: var(--text3); font-size: 13px; }

  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-size: 13px; transform: translateY(80px); opacity: 0; transition: all .25s; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); }
  #toast.error { border-color: var(--danger); }

  @media (max-width: 768px) {
    .input-layout, .admin-grid { grid-template-columns: 1fr; }
    main { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-icon">⏱</div>MH 관리 시스템</div>
  <div class="header-meta">
    <div class="ym-selector">
      <select id="selYear"></select>
      <select id="selMonth"></select>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="exportExcel()">📥 Excel</button>
  </div>
</header>

<nav>
  <div class="tab active" onclick="switchTab('input')">개인 입력</div>
  <div class="tab" onclick="switchTab('summary')">집계표</div>
  <div class="tab" onclick="switchTab('admin')">관리</div>
</nav>

<main>
  <!-- 개인 입력 -->
  <div id="tab-input" class="tab-panel active">
    <div class="input-layout">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">팀원 선택</span>
          <span id="memberCount" style="font-size:11px;color:var(--text3)"></span>
        </div>
        <div id="memberList" class="member-scroll"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title" id="inputTitle">팀원을 선택하세요</span>
          <div style="display:flex;gap:8px;align-items:center">
            <span id="totalBadge" style="font-family:var(--mono);font-size:12px;color:var(--text3)"></span>
            <button class="btn btn-primary btn-sm" onclick="saveMH()" id="saveBtn" style="display:none">💾 저장</button>
          </div>
        </div>
        <div id="inputArea" class="empty-state">팀원을 선택하면 입력 양식이 표시됩니다.</div>
      </div>
    </div>
  </div>

  <!-- 집계표 -->
  <div id="tab-summary" class="tab-panel">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" id="summaryTitle">집계표</span>
        <button class="btn btn-secondary btn-sm" onclick="loadSummary()">🔄 새로고침</button>
      </div>
      <div id="summaryStats" class="summary-grid"></div>
      <div class="summary-wrap">
        <table class="summary-table" id="summaryTable">
          <tbody><tr><td colspan="20"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 관리 -->
  <div id="tab-admin" class="tab-panel">
    <div class="admin-grid">
      <!-- 부서 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">부서 관리</span></div>
        <div id="deptTags" class="tag-list"></div>
        <div class="add-row">
          <input type="text" id="newDept" placeholder="부서명" onkeydown="if(event.key==='Enter')addDept()">
          <button class="btn btn-primary btn-sm" onclick="addDept()">추가</button>
        </div>
      </div>
      <!-- 팀원 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">팀원 관리</span></div>
        <div id="memberTags" class="tag-list"></div>
        <div class="add-row">
          <input type="text" id="newMember" placeholder="이름" style="width:80px" onkeydown="if(event.key==='Enter')addMember()">
          <select id="newMemberDept" style="flex:1"></select>
          <select id="newMemberType"><option value="본사">본사</option><option value="현장">현장(파견)</option></select>
          <button class="btn btn-primary btn-sm" onclick="addMember()">추가</button>
        </div>
      </div>
      <!-- 프로젝트 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">프로젝트 관리</span></div>
        <div id="projectTags" class="tag-list"></div>
        <div class="add-row">
          <input type="text" id="newProjNo" placeholder="Job No" style="width:90px">
          <input type="text" id="newProjName" placeholder="프로젝트명" onkeydown="if(event.key==='Enter')addProject()">
          <button class="btn btn-primary btn-sm" onclick="addProject()">추가</button>
        </div>
      </div>
      <!-- Overhead 항목 -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Overhead 항목 관리</span></div>
        <div id="ohTags" class="tag-list"></div>
        <div class="add-row">
          <input type="text" id="newOhNo" placeholder="코드 (예:1001)" style="width:110px">
          <input type="text" id="newOhName" placeholder="항목명" onkeydown="if(event.key==='Enter')addOh()">
          <button class="btn btn-primary btn-sm" onclick="addOh()">추가</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- 수정 모달 -->
<div id="editModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">수정</h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="confirmEdit()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://mhsystem.cbk68159.workers.dev';
const SECRET = 'mh2026!construction';
const MONTHLY_LIMIT = {1:168,2:128,3:168,4:176,5:144,6:168,7:184,8:160,9:160,10:160,11:168,12:176};
const DEFAULT_OH = [
  {no:'100',name:'연차휴가'},{no:'1001',name:'회사공통'},{no:'1002',name:'기타휴가'},
  {no:'1004',name:'사내교육'},{no:'1005',name:'팀 Mgmt'},{no:'2010',name:'기술연구소'},
  {no:'1000',name:'사업부(공사)'},{no:'3000',name:'사업부(엔지)'},{no:'5000',name:'사업부(플랜트)'},
  {no:'6000',name:'사업부(공사2)'},{no:'1090',name:'수주(공사)'},{no:'3090',name:'수주(엔지)'},
  {no:'5090',name:'수주(플랜트)'},{no:'6090',name:'수주(신사업)'},{no:'1021',name:'구미지사'},
];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let depts=[], members=[], projects=[], ohCols=[];
let selectedMember=null, currentData={}, editTarget=null;

window.onload = async () => {
  initYM();
  await Promise.all([loadDepts(), loadMembers(), loadProjects(), loadOhCols()]);
};

function initYM() {
  const ySel=document.getElementById('selYear'), mSel=document.getElementById('selMonth');
  for(let y=2024;y<=2030;y++) ySel.innerHTML+=`<option value="${y}" ${y===currentYear?'selected':''}>${y}년</option>`;
  for(let m=1;m<=12;m++) mSel.innerHTML+=`<option value="${m}" ${m===currentMonth?'selected':''}>${m}월</option>`;
  ySel.onchange=()=>{currentYear=+ySel.value;onYMChange();};
  mSel.onchange=()=>{currentMonth=+mSel.value;onYMChange();};
}
function onYMChange() {
  currentData={};
  if(selectedMember) loadMemberData(selectedMember);
  if(document.getElementById('tab-summary').classList.contains('active')) loadSummary();
}
function getYM(){return `${currentYear}-${String(currentMonth).padStart(2,'0')}`;}

async function api(method,path,body) {
  const opts={method,headers:{'Content-Type':'application/json','X-Secret-Key':SECRET}};
  if(body!==undefined) opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  return r.json();
}

// ── 부서 ──
async function loadDepts() {
  const d=await api('GET','/depts');
  depts=Array.isArray(d)?d:[];
  renderDeptTags(); renderDeptSelect();
}
function renderDeptTags() {
  const el=document.getElementById('deptTags');
  el.innerHTML=depts.map((d,i)=>`
    <span class="tag">${d.name}
      <button class="tag-btn" onclick="editItem('dept',${i})" title="수정">✏️</button>
      <button class="tag-btn del" onclick="removeDept(${i})">×</button>
    </span>`).join('')||'<span style="color:var(--text3);font-size:12px">부서가 없습니다.</span>';
}
function renderDeptSelect() {
  const sel=document.getElementById('newMemberDept');
  sel.innerHTML='<option value="">부서 없음</option>'+depts.map(d=>`<option value="${d.name}">${d.name}</option>`).join('');
}
async function addDept() {
  const name=document.getElementById('newDept').value.trim();
  if(!name) return;
  if(depts.find(d=>d.name===name)){showToast('이미 있는 부서입니다.','error');return;}
  depts.push({name});
  await api('POST','/depts',depts);
  document.getElementById('newDept').value='';
  renderDeptTags(); renderDeptSelect();
  showToast(`${name} 추가됨`,'success');
}
async function removeDept(i) {
  if(!confirm(`"${depts[i].name}" 부서를 삭제할까요?`)) return;
  depts.splice(i,1);
  await api('POST','/depts',depts);
  renderDeptTags(); renderDeptSelect();
  showToast('삭제됨');
}

// ── 팀원 ──
async function loadMembers() {
  const d=await api('GET','/members');
  members=Array.isArray(d)?d:[];
  renderMemberList(); renderMemberTags();
  document.getElementById('memberCount').textContent=`${members.length}명`;
}
function renderMemberList() {
  const el=document.getElementById('memberList');
  if(!members.length){el.innerHTML='<div class="empty-state">팀원을 추가하세요</div>';return;}
  const grouped={};
  members.forEach(m=>{const k=m.dept||'미배정';if(!grouped[k])grouped[k]=[];grouped[k].push(m);});
  el.innerHTML=Object.entries(grouped).map(([dept,list])=>`
    <div>
      <div class="dept-header">${dept} <span style="font-weight:400">${list.length}명</span></div>
      ${list.map(m=>`
        <div class="member-item ${selectedMember===m.name?'selected':''}" onclick="selectMember('${m.name}')">
          <div><div>${m.name}</div><div style="font-size:11px;color:var(--text3)">${m.type}</div></div>
          <span class="mh-badge" id="badge-${m.name}">-</span>
        </div>`).join('')}
    </div>`).join('');
  members.forEach(m=>updateMemberBadge(m.name));
}
function renderMemberTags() {
  const el=document.getElementById('memberTags');
  el.innerHTML=members.map((m,i)=>`
    <span class="tag">${m.name} <small style="color:var(--text3)">${m.dept||''} ${m.type}</small>
      <button class="tag-btn" onclick="editItem('member',${i})" title="수정">✏️</button>
      <button class="tag-btn del" onclick="removeMember(${i})">×</button>
    </span>`).join('')||'<span style="color:var(--text3);font-size:12px">팀원이 없습니다.</span>';
}
async function updateMemberBadge(name) {
  try {
    const d=await api('GET',`/data/${getYM()}/${encodeURIComponent(name)}`);
    const t=calcTotal(d);
    const el=document.getElementById(`badge-${name}`);
    if(el) el.textContent=t?t+'h':'-';
  }catch(e){}
}
async function selectMember(name) {
  selectedMember=name;
  renderMemberList();
  document.getElementById('inputTitle').textContent=name;
  document.getElementById('saveBtn').style.display='inline-flex';
  await loadMemberData(name);
}
async function loadMemberData(name) {
  document.getElementById('inputArea').innerHTML='<div class="loading"><div class="spinner"></div>불러오는 중...</div>';
  const d=await api('GET',`/data/${getYM()}/${encodeURIComponent(name)}`);
  currentData=(typeof d==='object'&&!d.error)?d:{};
  renderInputTable();
}
function calcTotal(data) {
  if(!data||typeof data!=='object') return 0;
  let t=0;
  Object.values(data).forEach(d=>{
    if(d.oh) Object.values(d.oh).forEach(v=>t+=(+v||0));
    if(d.pj) Object.values(d.pj).forEach(v=>t+=(+v||0));
  });
  return t;
}
async function addMember() {
  const name=document.getElementById('newMember').value.trim();
  const dept=document.getElementById('newMemberDept').value;
  const type=document.getElementById('newMemberType').value;
  if(!name) return;
  if(members.find(m=>m.name===name)){showToast('이미 있는 이름입니다.','error');return;}
  members.push({name,dept,type});
  await api('POST','/members',members);
  document.getElementById('newMember').value='';
  renderMemberList(); renderMemberTags();
  document.getElementById('memberCount').textContent=`${members.length}명`;
  showToast(`${name} 추가됨`,'success');
}
async function removeMember(i) {
  if(!confirm(`"${members[i].name}"을(를) 삭제할까요?`)) return;
  members.splice(i,1);
  await api('POST','/members',members);
  renderMemberList(); renderMemberTags();
  document.getElementById('memberCount').textContent=`${members.length}명`;
  showToast('삭제됨');
}

// ── 수정 모달 ──
function editItem(type,idx) {
  editTarget={type,idx};
  const modal=document.getElementById('editModal');
  const title=document.getElementById('modalTitle');
  const body=document.getElementById('modalBody');
  if(type==='dept') {
    title.textContent='부서 수정';
    body.innerHTML=`<div class="modal-row"><label>부서명</label><input id="ei0" value="${depts[idx].name}"></div>`;
  } else if(type==='member') {
    const m=members[idx];
    title.textContent='팀원 수정';
    body.innerHTML=`
      <div class="modal-row"><label>이름</label><input id="ei0" value="${m.name}"></div>
      <div class="modal-row"><label>부서</label>
        <select id="ei1"><option value="">부서 없음</option>${depts.map(d=>`<option value="${d.name}" ${d.name===m.dept?'selected':''}>${d.name}</option>`).join('')}</select>
      </div>
      <div class="modal-row"><label>구분</label>
        <select id="ei2"><option value="본사" ${m.type==='본사'?'selected':''}>본사</option><option value="현장" ${m.type==='현장'?'selected':''}>현장(파견)</option></select>
      </div>`;
  } else if(type==='project') {
    const p=projects[idx];
    title.textContent='프로젝트 수정';
    body.innerHTML=`
      <div class="modal-row"><label>Job No</label><input id="ei0" value="${p.no}"></div>
      <div class="modal-row"><label>프로젝트명</label><input id="ei1" value="${p.name}"></div>`;
  } else if(type==='oh') {
    const c=ohCols[idx];
    title.textContent='Overhead 항목 수정';
    body.innerHTML=`
      <div class="modal-row"><label>코드</label><input id="ei0" value="${c.no}"></div>
      <div class="modal-row"><label>항목명</label><input id="ei1" value="${c.name}"></div>`;
  }
  modal.style.display='flex';
  document.getElementById('ei0')?.focus();
}
async function confirmEdit() {
  if(!editTarget) return;
  const {type,idx}=editTarget;
  const g=id=>document.getElementById(id)?.value.trim();
  if(type==='dept') {
    depts[idx].name=g('ei0');
    await api('POST','/depts',depts);
    renderDeptTags(); renderDeptSelect(); renderMemberList(); renderMemberTags();
  } else if(type==='member') {
    members[idx].name=g('ei0');
    members[idx].dept=g('ei1');
    members[idx].type=g('ei2');
    await api('POST','/members',members);
    renderMemberList(); renderMemberTags();
  } else if(type==='project') {
    projects[idx].no=g('ei0'); projects[idx].name=g('ei1');
    await api('POST','/projects',projects);
    renderProjectTags();
  } else if(type==='oh') {
    ohCols[idx].no=g('ei0'); ohCols[idx].name=g('ei1');
    await api('POST','/ohcols',ohCols);
    renderOhTags();
  }
  closeModal();
  showToast('수정되었습니다.','success');
}
function closeModal() {
  document.getElementById('editModal').style.display='none';
  editTarget=null;
}

// ── 입력 테이블 ──
function renderInputTable() {
  const limit=MONTHLY_LIMIT[currentMonth]||176;
  const daysInMonth=new Date(currentYear,currentMonth,0).getDate();
  const today=new Date();
  const showPJ=projects.length>0;

  let html=`<div class="mh-table-wrap"><table class="mh-table"><thead><tr>
    <th class="col-date">일자</th>
    ${ohCols.map(c=>`<th class="col-oh" title="${c.no} ${c.name}">${c.name}</th>`).join('')}
    ${showPJ?projects.map(p=>`<th class="col-pj" title="${p.name}">${p.no}</th>`).join(''):''}
    <th>소계</th>
  </tr></thead><tbody>`;

  const colTotals={};
  ohCols.forEach(c=>colTotals[c.no]=0);
  projects.forEach(p=>colTotals[p.no]=0);

  for(let d=1;d<=daysInMonth;d++) {
    const date=new Date(currentYear,currentMonth-1,d);
    const dow=date.getDay();
    const isWeekend=dow===0||dow===6;
    const isToday=date.toDateString()===today.toDateString();
    const dd=currentData[d]||{oh:{},pj:{}};
    let rowTotal=0;
    ohCols.forEach(c=>rowTotal+=(+dd.oh?.[c.no]||0));
    projects.forEach(p=>rowTotal+=(+dd.pj?.[p.no]||0));
    const dowStr=['일','월','화','수','목','금','토'][dow];
    let cls=isWeekend?'weekend':(isToday?'istoday':'');
    if(rowTotal>8) cls+=' over-limit';

    html+=`<tr class="${cls}"><td class="col-date">${d}<span style="font-size:10px;margin-left:2px">${dowStr}</span></td>`;
    ohCols.forEach(c=>{
      const v=dd.oh?.[c.no]||'';
      colTotals[c.no]+=(+v||0);
      html+=`<td><input type="number" min="0" max="8" step="0.5" class="mh-input" data-day="${d}" data-type="oh" data-col="${c.no}" value="${v}" ${isWeekend?'disabled':''} onchange="onInputChange(this)"></td>`;
    });
    if(showPJ) projects.forEach(p=>{
      const v=dd.pj?.[p.no]||'';
      colTotals[p.no]+=(+v||0);
      html+=`<td><input type="number" min="0" max="8" step="0.5" class="mh-input" data-day="${d}" data-type="pj" data-col="${p.no}" value="${v}" ${isWeekend?'disabled':''} onchange="onInputChange(this)"></td>`;
    });
    const tc=rowTotal===0?'':(rowTotal<=8?'ok':'over');
    html+=`<td class="row-total ${tc}" id="rt-${d}">${rowTotal||''}</td></tr>`;
  }

  let grand=0;
  html+=`<tr class="col-total-row"><td>합계</td>`;
  ohCols.forEach(c=>{grand+=colTotals[c.no];html+=`<td>${colTotals[c.no]||''}</td>`;});
  if(showPJ) projects.forEach(p=>{grand+=colTotals[p.no];html+=`<td>${colTotals[p.no]||''}</td>`;});
  html+=`<td>${grand}</td></tr></tbody></table></div>`;
  document.getElementById('inputArea').innerHTML=html;
  updateTotalBadge(grand,limit);
}

function onInputChange(el) {
  const {day,type,col}=el.dataset;
  if(!currentData[day]) currentData[day]={oh:{},pj:{}};
  if(!currentData[day][type]) currentData[day][type]={};
  currentData[day][type][col]=+el.value||0;
  updateRowTotal(day); updateGrandTotal();
}
function updateRowTotal(day) {
  const d=currentData[day]||{oh:{},pj:{}};
  let t=0;
  ohCols.forEach(c=>t+=(+d.oh?.[c.no]||0));
  projects.forEach(p=>t+=(+d.pj?.[p.no]||0));
  const el=document.getElementById(`rt-${day}`);
  if(el){el.textContent=t||'';el.className='row-total '+(t===0?'':(t<=8?'ok':'over'));}
}
function updateGrandTotal(){updateTotalBadge(calcTotal(currentData),MONTHLY_LIMIT[currentMonth]||176);}
function updateTotalBadge(total,limit) {
  const el=document.getElementById('totalBadge');
  el.style.color=total>limit?'var(--danger)':(total===limit?'var(--success)':'var(--text2)');
  el.textContent=`${total} / ${limit}h`;
}
async function saveMH() {
  if(!selectedMember) return;
  await api('POST',`/data/${getYM()}/${encodeURIComponent(selectedMember)}`,currentData);
  showToast('저장되었습니다.','success');
  updateMemberBadge(selectedMember);
}

// ── 집계 ──
async function loadSummary() {
  document.getElementById('summaryStats').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  document.querySelector('#summaryTable tbody').innerHTML='<tr><td colspan="20"><div class="loading"><div class="spinner"></div></div></td></tr>';
  const data=await api('GET',`/data/${getYM()}`);
  renderSummary(data);
}
function renderSummary(data) {
  const limit=MONTHLY_LIMIT[currentMonth]||176;
  document.getElementById('summaryTitle').textContent=`${currentYear}년 ${currentMonth}월 집계표`;
  let totalMH=0,inputCount=0;
  members.forEach(m=>{const t=calcTotal(data[m.name]);totalMH+=t;if(t>0)inputCount++;});
  document.getElementById('summaryStats').innerHTML=`
    <div class="stat-card"><div class="stat-label">총 MH</div><div class="stat-value">${totalMH}</div><div class="stat-sub">h</div></div>
    <div class="stat-card"><div class="stat-label">입력 완료</div><div class="stat-value" style="color:var(--success)">${inputCount}</div><div class="stat-sub">/ ${members.length}명</div></div>
    <div class="stat-card"><div class="stat-label">평균 MH</div><div class="stat-value">${members.length?Math.round(totalMH/members.length):0}</div><div class="stat-sub">h / 인</div></div>
    <div class="stat-card"><div class="stat-label">월 기준</div><div class="stat-value" style="color:var(--accent)">${limit}</div><div class="stat-sub">h</div></div>`;

  const projTotals={};
  projects.forEach(p=>projTotals[p.no]=0);
  const grouped={};
  members.forEach(m=>{const k=m.dept||'미배정';if(!grouped[k])grouped[k]=[];grouped[k].push(m);});

  let thead=`<thead><tr>
    <th style="text-align:left">이름</th><th>OH</th>
    ${projects.map(p=>`<th title="${p.name}">${p.no}</th>`).join('')}
    <th>PJ</th><th>합계</th><th style="min-width:90px">달성률</th>
  </tr></thead>`;

  let rows='',grandOH=0,grandPJ=0,grandTotal=0;
  Object.entries(grouped).forEach(([dept,list])=>{
    rows+=`<tr class="dept-row"><td colspan="${4+projects.length}">📁 ${dept}</td></tr>`;
    list.forEach(m=>{
      const d=data[m.name]||{};
      let oh=0,pj=0;
      ohCols.forEach(c=>{oh+=Object.values(d).reduce((s,day)=>s+(+day.oh?.[c.no]||0),0);});
      projects.forEach(p=>{const v=Object.values(d).reduce((s,day)=>s+(+day.pj?.[p.no]||0),0);pj+=v;projTotals[p.no]+=v;});
      const total=oh+pj;
      grandOH+=oh;grandPJ+=pj;grandTotal+=total;
      const pct=Math.min(100,Math.round(total/limit*100));
      const bc=pct>=100?'var(--success)':(pct>=80?'var(--accent)':'var(--warning)');
      rows+=`<tr>
        <td>${m.name} <small style="color:var(--text3)">${m.type}</small></td>
        <td>${oh||''}</td>
        ${projects.map(p=>`<td>${Object.values(d).reduce((s,day)=>s+(+day.pj?.[p.no]||0),0)||''}</td>`).join('')}
        <td>${pj||''}</td><td><strong>${total}</strong></td>
        <td><div style="display:flex;align-items:center;gap:5px">
          <div class="mh-bar" style="flex:1"><div class="mh-bar-fill" style="width:${pct}%;background:${bc}"></div></div>
          <span style="font-size:11px;color:var(--text3);min-width:28px">${pct}%</span>
        </div></td>
      </tr>`;
    });
  });
  rows+=`<tr class="total-row"><td><strong>합계</strong></td><td><strong>${grandOH}</strong></td>
    ${projects.map(p=>`<td><strong>${projTotals[p.no]||''}</strong></td>`).join('')}
    <td><strong>${grandPJ}</strong></td><td><strong>${grandTotal}</strong></td><td></td></tr>`;
  document.getElementById('summaryTable').innerHTML=thead+`<tbody>${rows}</tbody>`;
}

// ── 탭 전환 ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['input','summary','admin'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='summary') loadSummary();
}

// ── Excel 내보내기 ──
async function exportExcel() {
  const data=await api('GET',`/data/${getYM()}`);
  const limit=MONTHLY_LIMIT[currentMonth]||176;
  let csv=`\uFEFF${currentYear}년 ${currentMonth}월 MH 집계표\n`;
  csv+=`이름,부서,구분,${ohCols.map(c=>c.name).join(',')},OH소계,${projects.map(p=>p.no).join(',')},PJ소계,합계,기준,달성률\n`;
  members.forEach(m=>{
    const d=data[m.name]||{};
    const ohArr=ohCols.map(c=>Object.values(d).reduce((s,day)=>s+(+day.oh?.[c.no]||0),0));
    const pjArr=projects.map(p=>Object.values(d).reduce((s,day)=>s+(+day.pj?.[p.no]||0),0));
    const ohSum=ohArr.reduce((a,b)=>a+b,0),pjSum=pjArr.reduce((a,b)=>a+b,0),total=ohSum+pjSum;
    csv+=`${m.name},${m.dept||''},${m.type},${ohArr.join(',')},${ohSum},${pjArr.join(',')},${pjSum},${total},${limit},${Math.round(total/limit*100)}%\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`MH_${getYM()}.csv`;a.click();
  showToast('다운로드 완료','success');
}

// ── 토스트 ──
let toastTimer;
function showToast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='',2500);
}
